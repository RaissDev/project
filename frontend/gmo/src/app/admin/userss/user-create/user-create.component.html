<div class="container mx-auto my-10 p-14 bg-white rounded shadow-md">
    <h2 class="text-center font-bold text-lg">Create User</h2>
        <div class="mb-4">
            <label for="username" class="block text-gray-700 font-bold mb-2">Name & last name</label>
            <input type="text" id="username" class="inputt">
        </div>
        <div class="mb-4">
            <label for="email" class="block text-gray-700 font-bold mb-2">Email</label>
            <input type="email" id="email" class="inputt">
        </div>
        <div class="mb-4">
            <label for="password" class="block text-gray-700 font-bold mb-2">Password</label>
            <input type="password" id="password" class="inputt">
        </div>
        <div class="mb-4">
            <label for="number" class="block text-gray-700 font-bold mb-2">Number</label>
            <input type="number" id="number" class="inputt">
        </div>
        <div class="mb-4">
            <label for="role" class="block text-gray-700 font-bold mb-2">Role</label>
            <select id="role" class="inputt">
                <option value="">Choose the role</option>
                <option *ngFor="let r of role" [value]="r">{{r}}</option>
            </select>
        </div>
        <button class="btn">Create User</button>
</div>
