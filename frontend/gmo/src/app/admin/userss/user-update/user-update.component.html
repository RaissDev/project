<div class="container ml-60 my-10 bg-white rounded shadow-md w-[350%]
    sm:px-6 lg:px-8 xs:px-2
    ">  


<h1 class="text-2xl font-bold mb-4 text-red-600 text-center">Update User</h1>
    
        <div class="grid grid-cols-2 gap-4  ml-auto
        xs:grid-cols-1
        md:grid-cols-2
        ">
        <div class="mb-4 ">
            <label for="username" class="block text-gray-700 font-bold mb-2">Name & last name</label>
            <input type="text" id="username" class="inputt" placeholder="Enter the name and last name" [(ngModel)]="name">
        </div>
        <div class="mb-4">
            <label for="email" class="block text-gray-700 font-bold mb-2">Email</label>
            <input type="email" id="email" class="inputt" placeholder="Enter the email" [(ngModel)]="email">
        </div>
        <div class="mb-4">
            <label for="password" class="block text-gray-700 font-bold mb-2">Password</label>
            <input type="password" id="password" class="inputt" placeholder="Enter the password" [(ngModel)]="password">
        </div>
        <div class="mb-4">
            <label for="number" class="block text-gray-700 font-bold mb-2">Number</label>
            <input type="text" id="number" class="inputt" placeholder="Enter the phone number " [(ngModel)]="phone">
        </div>
        <div class="mb-4">
            <label for="role" class="block text-gray-700 font-bold mb-2">Role</label>
            <select id="role" class="inputt text-gray-700" [(ngModel)]="role_selected">
                <option>Choose the role</option>
                <option *ngFor="let r of role" [value]="r">{{ r }}</option>
            </select>
        </div>

        </div>
    
        <div class="center_dev pb-4">
            <button class="btn justify-center" (click)="update() ">Create User</button>
        </div>
        </div>
